name: Deploy Frontend

on:
  push:
    branches: [development]
    tags: ['v*.*.*']

concurrency:
  group: heroic-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for tag checks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide target (dev vs prod)
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
            echo "ref_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
            echo "ref_name=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Guardrail — prod tags must be on main
        if: steps.target.outputs.env == 'prod'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --tags
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
            echo "ERROR: Tag ${GITHUB_REF_NAME} is not reachable from origin/main. Refusing to deploy."
            exit 1
          fi

      - name: Setup SSH key + known_hosts
        shell: bash
        env:
          DEV_SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          DEV_SSH_USER: ${{ secrets.DEV_SSH_USER }}
          DEV_SSH_KEY:  ${{ secrets.DEV_SSH_KEY }}
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_KEY:  ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          if [[ "${{ steps.target.outputs.env }}" == "prod" ]]; then
            SSH_HOST="$PROD_SSH_HOST"
            SSH_USER="$PROD_SSH_USER"
            SSH_KEY="$PROD_SSH_KEY"
          else
            SSH_HOST="$DEV_SSH_HOST"
            SSH_USER="$DEV_SSH_USER"
            SSH_KEY="$DEV_SSH_KEY"
          fi

          printf '%s' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

          echo "SSH_HOST=$SSH_HOST" >> "$GITHUB_ENV"
          echo "SSH_USER=$SSH_USER" >> "$GITHUB_ENV"

      - name: Upload frontend .local.env to VM
        shell: bash
        env:
          DEV_LOCAL_ENV_FILE:  ${{ secrets.DEV_LOCAL_ENV_FILE }}
          PROD_LOCAL_ENV_FILE: ${{ secrets.PROD_LOCAL_ENV_FILE }}
        run: |
          set -euo pipefail

          if [[ "${{ steps.target.outputs.env }}" == "prod" ]]; then
            ENV_FILE_CONTENT="$PROD_LOCAL_ENV_FILE"
          else
            ENV_FILE_CONTENT="$DEV_LOCAL_ENV_FILE"
          fi

          TMP_ENV="$(mktemp)"
          printf '%s' "$ENV_FILE_CONTENT" > "$TMP_ENV"

          scp -i ~/.ssh/deploy_key "$TMP_ENV" "$SSH_USER@$SSH_HOST:/home/exouser/heroic-frontend/.local.env"
          rm -f "$TMP_ENV"

      - name: Deploy frontend on VM
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.target.outputs.env }}" == "prod" ]]; then
            GIT_REF="${{ steps.target.outputs.ref_name }}"   # tag
          else
            GIT_REF="development"
          fi

          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "ENV=${{ steps.target.outputs.env }} GIT_REF=$GIT_REF bash -s" <<'REMOTE'
          set -euo pipefail

          # Same lock file as backend workflow to prevent overlap across repos
          exec 9>/tmp/heroic-deploy.lock
          flock -w 1800 9

          FRONTEND_DIR="/home/exouser/heroic-frontend"

          echo "================================================"
          echo " FRONTEND DEPLOY ($ENV)  ref=$GIT_REF"
          echo "================================================"

          cd "$FRONTEND_DIR"

          echo "[1/4] Update git checkout"
          git fetch --all --tags --prune
          if [[ "$ENV" == "prod" ]]; then
            git checkout --detach "$GIT_REF"
          else
            git checkout development
            git reset --hard origin/development
          fi
          git clean -fd

          echo "[2/4] Ensure heroic_net exists (frontend uses external network)"
          docker network inspect heroic_net >/dev/null 2>&1 || docker network create heroic_net

          echo "[3/4] Build + up"
          test -s .local.env || true
          docker compose down || true
          docker compose build --no-cache
          docker compose up -d

          echo "[4/4] Status"
          docker compose ps

          echo "✅ FRONTEND DEPLOY COMPLETE"
REMOTE