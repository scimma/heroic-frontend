name: Deploy frontend to DEV

on:
  push:
    branches:
      - development
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/scimma/heroic-frontend:dev
          build-args: |
            VITE_HEROIC_URL=${{ secrets.DEV_VITE_HEROIC_URL }}
            VITE_SIMBAD2K_API_URL=${{ secrets.VITE_SIMBAD2K_API_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/id_ed25519 <<'SSHEOF'
          ${{ secrets.DEV_SSH_KEY }}
          SSHEOF
          tr -d '\r' < ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.clean
          mv ~/.ssh/id_ed25519.clean ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEV_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: SSH sanity check
        run: |
          ssh -o BatchMode=yes ${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }} "echo SSH OK"

      - name: Deploy
        run: |
          GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          GHCR_ACTOR="${{ github.actor }}"
          ssh -o BatchMode=yes \
              "${{ secrets.DEV_SSH_USER }}@${{ secrets.DEV_SSH_HOST }}" \
              "GHCR_TOKEN=${GHCR_TOKEN} GHCR_ACTOR=${GHCR_ACTOR} bash -se" <<'REMOTE'
          set -e
          DEPLOY_PATH="/home/exouser/heroic-frontend"
          FRONTEND_IMAGE="ghcr.io/scimma/heroic-frontend:dev"

          cd "$DEPLOY_PATH"

          echo "--- Pulling latest code ---"
          git fetch origin --prune
          git checkout development
          git reset --hard origin/development

          echo "--- Logging in to GHCR ---"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

          echo "--- Pulling image and restarting frontend ---"
          FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose pull
          FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose down
          FRONTEND_IMAGE="$FRONTEND_IMAGE" docker compose up -d

          echo "--- Deploy complete ---"
          REMOTE

      - name: Smoke test
        run: |
          echo "Waiting for frontend to start..."
          for i in $(seq 1 12); do
            STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://dev.heroic.scimma.org/ || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "Frontend is up!"
              exit 0
            fi
            sleep 10
          done
          echo "Smoke test failed after 2 minutes"
          exit 1
